<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }

        .game-container {
            text-align: center;
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
        }

        .status {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 1rem 0;
            min-height: 1.5rem;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 5px;
            margin: 1rem auto;
            justify-content: center;
        }

        .cell {
            width: 100px;
            height: 100px;
            font-size: 2.5rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            border: 2px solid #333;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .cell:hover {
            background-color: #eaeaea;
        }

        .winning-cell {
            background-color: #baffc9;
        }

        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        .x {
            color: #ff4d4d;
        }

        .o {
            color: #4d79ff;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Tic Tac Toe</h1>
        <div class="status" id="status">Player X's turn</div>
        <div class="board" id="board"></div>
        <button id="reset-btn">Reset Game</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const board = document.getElementById('board');
            const status = document.getElementById('status');
            const resetBtn = document.getElementById('reset-btn');

            let currentPlayer = 'X';
            let gameBoard = ['', '', '', '', '', '', '', '', ''];
            let gameActive = true;

            // Create the game board
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', handleCellClick);
                board.appendChild(cell);
            }

            // Winning combinations
            const winPatterns = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
                [0, 4, 8], [2, 4, 6]             // diagonals
            ];

            function handleCellClick(e) {
                const index = parseInt(e.target.getAttribute('data-index'));

                // Check if cell is already taken or game is inactive
                if (gameBoard[index] !== '' || !gameActive) return;

                // Update board state
                gameBoard[index] = currentPlayer;
                e.target.textContent = currentPlayer;
                e.target.classList.add(currentPlayer.toLowerCase());

                // Check for win or draw
                if (checkWin()) {
                    status.textContent = `Player ${currentPlayer} wins!`;
                    gameActive = false;
                    highlightWinningCells();
                    return;
                }

                if (checkDraw()) {
                    status.textContent = "It's a draw!";
                    gameActive = false;
                    return;
                }

                // Switch player
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                status.textContent = `Player ${currentPlayer}'s turn`;
            }

            function checkWin() {
                return winPatterns.some(pattern => {
                    const [a, b, c] = pattern;
                    return (
                        gameBoard[a] !== '' &&
                        gameBoard[a] === gameBoard[b] &&
                        gameBoard[a] === gameBoard[c]
                    );
                });
            }

            function checkDraw() {
                return gameBoard.every(cell => cell !== '');
            }

            function highlightWinningCells() {
                winPatterns.forEach(pattern => {
                    const [a, b, c] = pattern;
                    if (
                        gameBoard[a] !== '' &&
                        gameBoard[a] === gameBoard[b] &&
                        gameBoard[a] === gameBoard[c]
                    ) {
                        document.querySelector(`[data-index="${a}"]`).classList.add('winning-cell');
                        document.querySelector(`[data-index="${b}"]`).classList.add('winning-cell');
                        document.querySelector(`[data-index="${c}"]`).classList.add('winning-cell');
                    }
                });
            }

            function resetGame() {
                gameBoard = ['', '', '', '', '', '', '', '', ''];
                gameActive = true;
                currentPlayer = 'X';
                status.textContent = `Player ${currentPlayer}'s turn`;

                // Clear board
                document.querySelectorAll('.cell').forEach(cell => {
                    cell.textContent = '';
                    cell.classList.remove('x', 'o', 'winning-cell');
                });
            }

            resetBtn.addEventListener('click', resetGame);
        });
    </script>
</body>
</html>
